title: "615 Realty Guy — John Crowder"
description: "North Nashville Realtor sharing housing market insights, real estate trends, and homebuyer/seller guides for Middle Tennessee."
url: "https://615realtyguy.com"
baseurl: ""
author: "John Crowder"

permalink: /blog/:title/

paginate: 9
paginate_path: "/blog/page:num/"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

feed:
  path: feed.xml

defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      author: "John Crowder"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - CNAME
  - node_modules
  - vendor
  - BLOG-SOP.md

keep_files:
  - market_widget
  - downloads
  - reports
