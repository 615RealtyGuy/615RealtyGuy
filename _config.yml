title: "615 Realty Guy — John Crowder"
description: "North Nashville Realtor sharing housing market insights, real estate trends, and homebuyer/seller guides for Middle Tennessee."
url: "https://615realtyguy.com"
baseurl: ""
author: "John Crowder"

permalink: /blog/:title/

paginate: 9
paginate_path: "/blog/page:num/"

# --- Listings -------------------------------------------------------------
# Each file in _listings/ becomes a page at /listings/<filename>/.
collections:
  listings:
    output: true
    permalink: /listings/:name/

# Base URL for listing photos. Today: served in-repo from /assets/listings.
# To move to Cloudflare R2 later, change this ONE line to the media domain
# (e.g. "https://media.615realtyguy.com/listings") and re-run nothing else.
listing_media_base: "/assets/listings"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

feed:
  path: feed.xml

defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      author: "John Crowder"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - CNAME
  - node_modules
  - vendor
  - BLOG-SOP.md
  - LISTINGS.md
  - scripts
  - serve.js
  - package.json
  - package-lock.json

keep_files:
  - market_widget
  - downloads
  - reports
